<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Technoid — Contact</title><link rel="stylesheet" href="assets/css/styles.css"/><script>(function(){const fallback='http://localhost:4000';let base=fallback;try{const saved=(localStorage.getItem('API_BASE')||'').trim();if(saved){const u=new URL(saved);if((u.protocol==='http:'||u.protocol==='https:')&&(u.hostname==='localhost'||u.hostname==='127.0.0.1')){base=u.origin;}}}catch(e){}window.API_BASE=base;console.log('API_BASE =',window.API_BASE);})();</script><script defer src="assets/js/app.js"></script></head><body><header class="nav"><div class="brand">Technoid</div><nav><a href="index.html" data-page="home">Home</a><a href="design.html" data-page="design">Design</a><a href="web.html" data-page="web">Web</a><a href="contact.html" data-page="contact">Contact</a></nav></header><main class="container"><h1>Contact / Book a Repair</h1><p>Fill the form below and I’ll get back to you.</p><form id="contact-form" class="card" autocomplete="on"><label><span>Name</span><input type="text" id="name" name="name" placeholder="Your name" required/></label><label><span>Email</span><input type="email" id="email" name="email" placeholder="you@example.com" required/></label><label><span>Message</span><textarea id="message" name="message" rows="6" placeholder="How can I help?" required></textarea></label><button class="btn" type="submit">Send Message</button></form></main><script>document.getElementById('contact-form').addEventListener('submit',async(e)=>{e.preventDefault();const name=document.getElementById('name').value.trim();const email=document.getElementById('email').value.trim();const message=document.getElementById('message').value.trim();if(!name||!email||!message){return toast('Please fill in all fields.');}try{await api('/api/contact',{method:'POST',body:JSON.stringify({name,email,message})});toast('Thanks! Your message has been sent.');e.target.reset();}catch(err){console.error(err);toast('Failed to send: '+(err&&err.message?err.message:'Check API & DB'));}});</script></body></html>
